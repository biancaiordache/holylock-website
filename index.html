<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HolyLock — Read first. Scroll second.</title>
  <meta name="description" content="Block your phone until you read the Bible. iOS." />
  <meta property="og:title" content="HolyLock" />
  <meta property="og:description" content="Block your phone until you read the Bible. iOS." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://holylock.com" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="shortcut icon" href="/favicon.ico" />
</head>
<body class="landing">
  <main class="landing-main">
    <img
      src="/holylock-icon.png"
      alt="HolyLock"
      class="landing-mark"
      width="44"
      height="44"
    />
    <div class="landing-copy">
      <h1 class="landing-headline">
        <span class="landing-app-rotator" aria-live="polite">
          <span class="landing-app-name" data-rotator>Instagram</span>
        </span>
        <span class="landing-headline-tail">is taking you away from <span class="landing-accent">God.</span></span>
      </h1>
      <p class="landing-sub">
        Block your phone until you read the <span class="landing-accent landing-accent-upright">Bible.</span>
      </p>
      <p class="landing-eyebrow">
        <svg class="landing-eyebrow-apple" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M16.365 1.43c0 1.14-.42 2.22-1.13 3.02-.76.86-1.99 1.52-3 1.43-.13-1.13.42-2.31 1.1-3.06.77-.85 2.07-1.49 3.03-1.39zM20.5 17.05c-.55 1.27-.81 1.84-1.51 2.96-.99 1.57-2.39 3.53-4.13 3.55-1.54.02-1.94-.99-4.04-.98-2.1.01-2.54 1-4.08.98-1.74-.02-3.06-1.79-4.05-3.36-2.78-4.4-3.07-9.56-1.36-12.31 1.22-1.96 3.14-3.11 4.95-3.11 1.84 0 3 .99 4.52.99 1.48 0 2.38-1 4.51-1 1.61 0 3.31.86 4.53 2.34-3.99 2.16-3.34 7.79.66 9.94z"/>
        </svg>
        <span>Coming soon to the App Store</span>
      </p>

      <form class="landing-notify" id="notify-form" novalidate>
        <label class="visually-hidden" for="notify-email">Email address</label>
        <input
          id="notify-email"
          name="email"
          type="email"
          required
          autocomplete="email"
          inputmode="email"
          placeholder="you@email.com"
          class="landing-notify-input"
        />
        <button type="submit" class="landing-notify-button">Notify me</button>
      </form>
      <p class="landing-notify-help">We'll send one email when HolyLock launches.</p>
    </div>

    <div class="landing-visual">
      <!-- Splash → video sequence. The PNG splash sits on top of the
           video (both are 798×1440 so they share the container with
           no layout shift). After ~2.2s the JS handler fades the
           splash out and starts the video. Autoplay-muted-loop-
           playsinline is the required combo for iOS Safari to play
           inline without a user tap. -->
      <div class="landing-media">
        <video
          class="landing-screenshot landing-media-video"
          muted
          loop
          playsinline
          preload="auto"
          poster="/hero-splash.png"
          aria-label="HolyLock home screen preview"
        >
          <source src="/hero-video.mp4" type="video/mp4" />
          <img src="/hero-splash.png" alt="HolyLock" />
        </video>
        <!-- Black pill that covers the "getbezel.app" badge baked
             into the video at the dynamic-island position. Sized in
             percentages of the container so it tracks the video at
             every scale. Position values were derived from frames
             extracted from the source mp4. -->
        <div class="landing-media-bezel-mask" aria-hidden="true"></div>
        <img
          src="/hero-splash.png"
          alt=""
          aria-hidden="true"
          class="landing-screenshot landing-media-splash"
          data-splash
        />
      </div>
    </div>
  </main>

  <footer class="landing-footer">
    <nav>
      <a href="/privacy">Privacy Policy</a>
      <span>·</span>
      <a href="/terms">Terms of Service</a>
      <span>·</span>
      <a href="/support">Support</a>
    </nav>
    <p>&copy; 2026 Studio Kirei. All Rights Reserved.</p>
  </footer>

  <script>
    // Mirror the in-app Welcome2Screen rotation: swap app names with a
    // soft fade + scale so the eye stays anchored on "is taking you
    // away from God." Same apps, same cadence as the iOS app
    // (~2.4s steady state, with one quick first-swap at 0.9s so the
    // user sees the rotation mechanic before the next swap is due).
    (function () {
      var APPS = ['Instagram', 'TikTok', 'Snapchat', 'X'];
      var FAST_SWAP_MS = 900;
      var STEADY_SWAP_MS = 2400;
      var FADE_MS = 450;
      var node = document.querySelector('[data-rotator]');
      if (!node) return;
      var index = 0;

      function show(name) {
        node.style.opacity = '0';
        node.style.transform = 'scale(0.85)';
        window.setTimeout(function () {
          node.textContent = name;
          node.style.opacity = '1';
          node.style.transform = 'scale(1)';
        }, FADE_MS / 2);
      }

      function next() {
        index = (index + 1) % APPS.length;
        show(APPS[index]);
      }

      // Honor reduced-motion preferences — show one app and stop.
      var prefersReduced = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      if (prefersReduced) return;

      window.setTimeout(function () {
        next();
        window.setInterval(next, STEADY_SWAP_MS);
      }, FAST_SWAP_MS);
    })();

    // ============================================================
    // Splash → hero video transition.
    //
    // Desktop: the PNG splash holds for ~2.2s then crossfades out
    // as the video starts playing underneath (autoplay).
    //
    // Mobile: NO autoplay. The splash sits over the video with a
    // play-button overlay (CSS-driven via .landing-media-needs-tap)
    // and the user must tap to start. Same crossfade once tapped.
    //
    // Reduced-motion users get a snap (no fade) instead of the
    // 700ms opacity transition.
    // ============================================================
    (function () {
      var SPLASH_HOLD_MS = 2200;
      var FADE_MS = 700;

      var splash = document.querySelector('[data-splash]');
      var video = document.querySelector('.landing-media-video');
      var media = document.querySelector('.landing-media');
      if (!splash || !video || !media) return;

      var prefersReduced = window.matchMedia &&
        window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      var isMobile = window.matchMedia &&
        window.matchMedia('(max-width: 700px)').matches;

      function startVideo() {
        var playPromise = video.play();
        if (playPromise && typeof playPromise.catch === 'function') {
          playPromise.catch(function () { /* ignore autoplay rejection */ });
        }

        if (prefersReduced) {
          splash.style.display = 'none';
        } else {
          splash.style.transition = 'opacity ' + FADE_MS + 'ms ease-out';
          splash.style.opacity = '0';
          window.setTimeout(function () {
            splash.style.display = 'none';
          }, FADE_MS);
        }
      }

      if (isMobile) {
        // Surface the play button overlay and wait for the tap.
        media.classList.add('landing-media-needs-tap');
        media.addEventListener('click', function onTap() {
          media.classList.remove('landing-media-needs-tap');
          media.removeEventListener('click', onTap);
          startVideo();
        });
      } else {
        window.setTimeout(startVideo, SPLASH_HOLD_MS);
      }
    })();

    // ============================================================
    // "Notify me" launch-list signup.
    //
    // Two transport modes:
    //
    //   1. NOTIFY_ENDPOINT is set → POST {email} as form-data via
    //      fetch(). Works with any service that accepts a plain
    //      form post and returns 2xx — Formspree, Buttondown,
    //      Mailerlite's hosted form action, a Vercel serverless
    //      function, Google Forms (with a slight tweak), etc.
    //
    //   2. NOTIFY_ENDPOINT is empty → fall back to opening the
    //      visitor's mail app pre-filled to NOTIFY_FALLBACK_EMAIL.
    //      Works today with no third-party setup; UX is rougher
    //      than a real form (mobile is fine, desktop without a
    //      configured mail client gets a blank window).
    //
    // To upgrade to a real form: sign up at https://formspree.io
    // (or any equivalent), get the endpoint URL (e.g.
    // "https://formspree.io/f/abc123"), and paste it as
    // NOTIFY_ENDPOINT below. No other code changes needed.
    // ============================================================
    (function () {
      var NOTIFY_ENDPOINT = 'https://formspree.io/f/mnjlkykv';
      var NOTIFY_FALLBACK_EMAIL = 'hello@holylock.com';

      var form = document.getElementById('notify-form');
      var input = document.getElementById('notify-email');
      var help = document.querySelector('.landing-notify-help');
      if (!form || !input || !help) return;

      function showThanks() {
        form.innerHTML =
          '<p class="landing-notify-confirmation">' +
          '<span aria-hidden="true">\u{1F90D}</span> ' +
          'Thank you. We’ll let you know the moment HolyLock launches.' +
          '</p>';
        help.style.display = 'none';
      }

      function showError(message) {
        help.textContent = message;
        help.classList.add('landing-notify-help-error');
      }

      function clearError() {
        help.textContent = "We'll send one email when HolyLock launches.";
        help.classList.remove('landing-notify-help-error');
      }

      input.addEventListener('input', clearError);

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        var email = input.value.trim();
        // Cheap email shape check — server-side validation is the
        // real source of truth; this just catches obvious typos.
        if (!email || email.indexOf('@') < 1 || email.indexOf('.') < 0) {
          showError('Please enter a valid email.');
          input.focus();
          return;
        }

        var button = form.querySelector('button');
        if (button) {
          button.disabled = true;
          button.textContent = 'Sending…';
        }

        if (NOTIFY_ENDPOINT) {
          try {
            var response = await fetch(NOTIFY_ENDPOINT, {
              method: 'POST',
              headers: { 'Accept': 'application/json' },
              body: new FormData(form),
            });
            if (!response.ok) throw new Error('signup failed');
            showThanks();
          } catch (err) {
            if (button) {
              button.disabled = false;
              button.textContent = 'Notify me';
            }
            showError('Something went wrong. Try again, or email us directly.');
          }
        } else {
          // mailto fallback — open the user's mail app with the
          // signup pre-filled. Worst-case UX (desktop without a
          // mail client) but works without any backend setup.
          var subject = encodeURIComponent('Notify me when HolyLock launches');
          var body = encodeURIComponent(
            'Please add ' + email + ' to the HolyLock launch list.\n\nSent from holylock.com'
          );
          window.location.href =
            'mailto:' + NOTIFY_FALLBACK_EMAIL + '?subject=' + subject + '&body=' + body;
          showThanks();
        }
      });
    })();
  </script>
</body>
</html>
